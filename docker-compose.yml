services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: taynote
      POSTGRES_USER: taynote
      POSTGRES_PASSWORD: taynote
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taynote -d taynote"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./taynote.api
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: taynote
      DB_USER: taynote
      DB_PASSWORD: taynote
    ports:
      - "4400:4400"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./taynote.ui
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:4400
    ports:
      - "4300:4300"
    depends_on:
      - backend

volumes:
  db-data:
